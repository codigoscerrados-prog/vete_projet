<section class="login-wrapper">
  <div class="card shadow-sm border-0 login-card">
    <div class="card-body p-4 p-md-5">
      <h2 class="h4 fw-bold mb-1">Acceso del personal</h2>
      <p class="text-muted mb-4">
        Inicia sesion para registrar mascotas, gestionar citas y revisar historiales.
      </p>

      <form [formGroup]="loginForm" (ngSubmit)="ingresar()" novalidate>
        <div class="mb-3">
          <label for="username" class="form-label">Usuario</label>
          <input id="username" type="text" class="form-control" formControlName="username" />
          <small class="text-danger" *ngIf="loginForm.controls.username.touched && loginForm.controls.username.invalid">
            El usuario es obligatorio.
          </small>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Contrasena</label>
          <input id="password" type="password" class="form-control" formControlName="password" />
          <small class="text-danger" *ngIf="loginForm.controls.password.touched && loginForm.controls.password.invalid">
            La contrasena debe tener al menos 4 caracteres.
          </small>
        </div>

        <div class="alert alert-danger py-2" *ngIf="errorMessage">{{ errorMessage }}</div>

        <button type="submit" class="btn btn-primary w-100 mt-2">Ingresar</button>
      </form>

      <p class="small text-muted mt-3 mb-0">Demo: usuario <strong>admin</strong> y clave <strong>vet2026</strong>.</p>
    </div>
  </div>
</section>
