<div class="shell-root">
  <header class="shell-header">
    <div class="container py-3 d-flex flex-wrap align-items-center justify-content-between gap-3">
      <div>
        <h1 class="h4 fw-bold mb-1">Veterinaria</h1>
        <p class="mb-0 text-muted small">Digitalizacion de mascotas, citas e historial clinico</p>
      </div>
      <div class="d-flex align-items-center gap-3">
        <span class="text-muted small">Sesion: {{ usuarioActual }}</span>
        <button type="button" class="btn btn-outline-secondary btn-sm" (click)="cerrarSesion()">
          Cerrar sesion
        </button>
      </div>
    </div>
  </header>

  <nav class="shell-nav border-bottom">
    <div class="container py-2 d-flex gap-2 flex-wrap">
      <a
        routerLink="/mascotas"
        routerLinkActive="active-link"
        class="btn btn-light btn-sm nav-pill"
        ariaCurrentWhenActive="page"
      >
        Mascotas
      </a>
      <a
        routerLink="/citas"
        routerLinkActive="active-link"
        class="btn btn-light btn-sm nav-pill"
        ariaCurrentWhenActive="page"
      >
        Citas
      </a>
      <a
        routerLink="/historial"
        routerLinkActive="active-link"
        class="btn btn-light btn-sm nav-pill"
        ariaCurrentWhenActive="page"
      >
        Historial
      </a>
    </div>
  </nav>

  <main class="container py-4">
    <router-outlet></router-outlet>
  </main>
</div>
